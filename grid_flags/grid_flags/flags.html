<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Country Flags</title>

<style>


header{
    background:#222;
    color:white;
    text-align:center;
    padding:20px;
}



main{
    display:grid;
    grid-template-columns: repeat(2, 350px);
    justify-content:center;
    align-items:start;
    gap:30px;
    padding:30px;
}



.flag-box{
    background:white;
    padding:10px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,.3);
}

h2{
    margin-top:0;
}



#chile{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    grid-template-rows:1fr 1fr;
    width:300px;
    height:200px;
}

#blue{
    background:blue;
    display:grid;
    place-items:center;
}

#white{
    background:white;
    grid-column:2/4;
}

#red{
    background:red;
    grid-column:1/4;
}

.star{
    width:70px;
    aspect-ratio:1;
    background:white;
    clip-path: polygon(50% 0,79% 90%,2% 35%,98% 35%,21% 90%);
}



#denmark{
    display:grid;
    grid-template-columns:1fr .2fr 2fr;
    grid-template-rows:1fr .2fr 1fr;
    width:300px;
    height:200px;
    background:white;
}

#dred1,#dred2,#dred3,#dred4{
    background:red;
}

#dred1{grid-column:1/2;grid-row:1/2;}
#dred2{grid-column:3/4;grid-row:1/2;}
#dred3{grid-column:1/2;grid-row:3/4;}
#dred4{grid-column:3/4;grid-row:3/4;}



#finland{
    display:grid;
    grid-template-columns:1fr .3fr 2fr;
    grid-template-rows:1fr .3fr 1fr;
    width:300px;
    height:200px;
    background:blue;
}

#fwhite1,#fwhite2,#fwhite3,#fwhite4{
    background:white;
}

#fwhite1{grid-column:1/2;grid-row:1/2;}
#fwhite2{grid-column:3/4;grid-row:1/2;}
#fwhite3{grid-column:1/2;grid-row:3/4;}
#fwhite4{grid-column:3/4;grid-row:3/4;}



#benin{
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-rows:1fr 1fr;
    width:300px;
    height:200px;
}

#bgreen{
    background:green;
    grid-column:1/2;
    grid-row:1/3;
}

#byellow{
    background:yellow;
}

#bred{
    background:red;
}



#italy{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    width:300px;
    height:200px;
}

#igreen{
    background:green;
}

#iwhite{
    background:white;
}

#ired{
    background:red;
}



#car{
    display:grid;
    grid-template-columns:1fr 1fr 40px 1fr;
    grid-template-rows:repeat(4,1fr);
    width:300px;
    height:200px;
}

#carblue{
    background:#003082;
    grid-column:1/5;
    grid-row:1/2;
}

#carwhite{
    background:white;
    grid-column:1/5;
    grid-row:2/3;
}

#cargreen{
    background:#289728;
    grid-column:1/5;
    grid-row:3/4;
}

#caryellow{
    background:#ffd400;
    grid-column:1/5;
    grid-row:4/5;
}

#carred{
    background:red;
    grid-column:3/4;
    grid-row:1/5;
}

#carstar{
    background:gold;
    width:45px;
    height:45px;
    z-index:2;
    grid-column:1/2;
    grid-row:1/2;
    justify-self:start;
    align-self:start;
    margin:8px;
    clip-path: polygon(50% 0,79% 90%,2% 35%,98% 35%,21% 90%);
}

</style>
</head>

<body>

<header>
<h1>Using CSS Grid to Make Country Flags</h1>
</header>

<main>

<div class="flag-box">
<h2>Chile</h2>
<div id="chile">
<div id="blue">
<div class="star"></div>
</div>
<div id="white"></div>
<div id="red"></div>
</div>
</div>

<div class="flag-box">
<h2>Denmark</h2>
<div id="denmark">
<div id="dred1"></div>
<div id="dred2"></div>
<div id="dred3"></div>
<div id="dred4"></div>
</div>
</div>

<div class="flag-box">
<h2>Finland</h2>
<div id="finland">
<div id="fwhite1"></div>
<div id="fwhite2"></div>
<div id="fwhite3"></div>
<div id="fwhite4"></div>
</div>
</div>

<div class="flag-box">
<h2>Benin</h2>
<div id="benin">
<div id="bgreen"></div>
<div id="byellow"></div>
<div id="bred"></div>
</div>
</div>

<div class="flag-box">
<h2>Italy</h2>
<div id="italy">
<div id="igreen"></div>
<div id="iwhite"></div>
<div id="ired"></div>
</div>
</div>

<div class="flag-box">
<h2>C.A.R.</h2>
<div id="car">
<div id="carblue"></div>
<div id="carwhite"></div>
<div id="cargreen"></div>
<div id="caryellow"></div>
<div id="carred"></div>
<div id="carstar"></div>
</div>
</div>

</main>

</body>
</html>
