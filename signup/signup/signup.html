<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Feed Sign Up</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#816845;
    font-family:Georgia, serif;
    display:flex;
    justify-content:center;
    padding:18px;
}

#formContainer{
    width:420px;
    background:#eee;
    border:10px solid #0033aa;
    border-radius:30px;
    overflow:hidden;
}

/* HERO */
.hero{
    position:relative;
}

.hero img{
    width:100%;
    height:180px;
    display:block;
    object-fit:cover;
    object-position:center top;
}

.hero-text{
    position:absolute;
    top:35px;
    left:0;
    width:100%;
    text-align:center;
    color:white;
    text-shadow:3px 3px 5px black;
}

.hero-text h1{
    font-size:32px;
}

.hero-text h2{
    font-size:18px;
}

#closeBtn{
    position:absolute;
    top:10px;
    left:10px;
    width:30px;
    height:30px;
    font-size:20px;
    cursor:pointer;
    z-index:10;
}

/* TITLE */
h3{
    text-align:center;
    font-size:18px;
    margin:18px 0;
}

/* FORM */
form{
    padding:0 20px 15px;
    display:grid;
    grid-template-columns:150px 1fr;
    gap:14px 10px;
    align-items:center;
}

input[type=text],
input[type=password],
input[type=email]{
    width:100%;
    padding:4px;
}

.gender{
    display:flex;
    gap:5px;
}

.full{
    grid-column:1/3;
    text-align:center;
}

.submit-area{
    grid-column:1/3;
    text-align:center;
}

.submit-area button{
    padding:4px 12px;
}

/* BOOKS */
.books{
    display:grid;
    grid-template-columns:repeat(5,1fr);
}

.books img{
    width:100%;
    height:100px;
    object-fit:contain;
    background:#000814;
    border-right:1px solid white;
}

.books img:last-child{
    border-right:none;
}
</style>
</head>

<body>

<div id="formContainer">

    <div class="hero">
        <button type="button" id="closeBtn">X</button>

        <img src="images/jesus_feeds_5000.jpeg" alt="Jesus">

        <div class="hero-text">
            <h1>Daily Feed</h1>
            <h2>Scripture a Day</h2>
        </div>
    </div>

    <h3>Sign Up for Daily Scripture Feed</h3>

    <form id="myForm">

        <label for="username">User Name:</label>
        <input type="text" id="username" name="username" required>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label>Gender:</label>
        <div class="gender">
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>

            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
        </div>

        <div class="full">
            <input type="checkbox" id="newsletter" name="newsletter">
            <label for="newsletter">Subscribe to newsletter</label>
        </div>

        <div class="full">
            <input type="checkbox" id="conditions" name="conditions" required>
            <label for="conditions">I acknowledge the terms and conditions</label>
        </div>

        <div class="submit-area">
            <button type="submit">Submit</button>
        </div>

    </form>

    <div class="books">
        <img src="images/old_testament.webp" alt="">
        <img src="images/new_testament.webp" alt="">
        <img src="images/book_of_mormon.webp" alt="">
        <img src="images/doctrine_and_covenants.webp" alt="">
        <img src="images/pearl_of_great_price.webp" alt="">
    </div>

</div>

<div id="output"></div>

<script>
document.getElementById("closeBtn").addEventListener("click", function () {
    document.getElementById("formContainer").style.display = "none";
});

const form = document.getElementById('myForm');
const output = document.getElementById('output');

form.addEventListener('submit', function (event) {
    event.preventDefault();

    const formData = new FormData(form);
    const entries = [];

    for (const [key, value] of formData.entries()) {
        if (key == "password") {
            entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
        } else {
            entries.push(`<strong>${key}</strong>: ${value}`);
        }
    }

    output.innerHTML = `
    <h3>Here is the data that would be sent to the server:</h3>
    <ul>
        ${entries.map(item => `<li>${item}</li>`).join('')}
    </ul>
    `;
});
</script>

</body>
</html>
