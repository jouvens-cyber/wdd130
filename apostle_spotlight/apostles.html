<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>

    <style>

        body{
            background-color: #E8E8E8;
            font-family: Arial, Helvetica, sans-serif;
        }

        .container{
            width: 700px;
            margin: 30px auto;
            background-image: url("images/christus.webp");
            background-size: cover;
            background-position: center;
            border: 5px solid black;
            border-radius: 35px;
            padding: 20px;
            color: white;
        }

        h1{
            text-align: center;
            font-size: 28px;
            margin-bottom: 15px;
        }

        h2{
            text-align: center;
            font-size: 22px;
            margin-top: 10px;
            margin-bottom: 15px;
        }

        .first-presidency{
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-bottom: 15px;
        }

        .apostles{
            width: 520px;
            margin: 0 auto;

            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 18px;
            justify-items: center;
        }

        .apostle img{
            width: 82px;
            height: 82px;
            object-fit: cover;
            border-radius: 50%;
            border: 5px solid white;
            transition: 0.3s;
        }

        
        .apostle img:hover{
            border-color: gold;
            transform: scale(1.08);
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>First Presidency</h1>

        <div class="first-presidency">

            <div class="apostle">
                <img src="images/oaks.webp" alt="Oaks">
            </div>

            <div class="apostle">
                <img src="images/eyring.webp" alt="Eyring">
            </div>

            <div class="apostle">
                <img src="images/uchtdorf.webp" alt="Uchtdorf">
            </div>

        </div>

        <h2>Quorum of the Twelve Apostles</h2>

        <div class="apostles">

            <div class="apostle">
                <img src="images/christofferson.webp" alt="Christofferson">
            </div>

            <div class="apostle">
                <img src="images/anderson.webp" alt="Anderson">
            </div>

            <div class="apostle">
                <img src="images/rasband.webp" alt="Rasband">
            </div>

            <div class="apostle">
                <img src="images/cook.webp" alt="Cook">
            </div>

            <div class="apostle">
                <img src="images/bednar.webp" alt="Bednar">
            </div>

            <div class="apostle">
                <img src="images/soares.webp" alt="Soares">
            </div>

            <div class="apostle">
                <img src="images/gong.webp" alt="Gong">
            </div>

            <div class="apostle">
                <img src="images/renlund.webp" alt="Renlund">
            </div>

            <div class="apostle">
                <img src="images/stevenson.webp" alt="Stevenson">
            </div>

            <div class="apostle">
                <img src="images/causse.webp" alt="Causse">
            </div>

            <div class="apostle">
                <img src="images/gilbert.webp" alt="Gilbert">
            </div>

            <div class="apostle">
                <img src="images/kearon.webp" alt="Kearon">
            </div>

        </div>

    </div>

</body>
</html>
