<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Favorite Devotionals</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>

<body>

    <div class="container">

        <header class="header">
            <div class="header-image">
                <h1>My Favorite<br>Devotionals</h1>
            </div>
        </header>

        <main>

            <div class="content-box">

                <!-- TABLE -->
                <table>

                    <tr>
                        <th>Speaker</th>
                        <th>Title</th>
                        <th>Location</th>
                        <th>Year</th>
                    </tr>

                    <tr>
                        <td>Russell M. Nelson</td>
                        <td>Think Celestial</td>
                        <td>Conference Center</td>
                        <td>2023</td>
                    </tr>

                    <tr>
                        <td>Jeffrey R. Holland</td>
                        <td>Tomorrow the Lord Will Do Wonders Among You</td>
                        <td>Conference Center</td>
                        <td>2016</td>
                    </tr>

                    <tr>
                        <td>Dieter F. Uchtdorf</td>
                        <td>The Infinite Power of Hope</td>
                        <td>Conference Center</td>
                        <td>2008</td>
                    </tr>

                </table>

                <!-- FORM -->
                <h2>Enter your own favorite devo</h2>

                <form>

                    <label for="speaker">Speaker</label>
                    <input id="speaker" type="text">

                    <br>

                    <label for="title">Title</label>
                    <input id="title" type="text">

                    <br>

                    <label for="location">Location</label>
                    <input id="location" type="text">

                    <br>

                    <label for="year">Year</label>
                    <input id="year" type="number">

                    <br>

                    <input type="submit" value="Submit">

                </form>

            </div>

        </main>

    </div>

</body>
</html>
